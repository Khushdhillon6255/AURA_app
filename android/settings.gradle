pluginManagement {
    def flutterSdkPath = {
        def properties = new java.util.Properties()
        file("local.properties").withInputStream { stream ->
            properties.load(stream)
        }
        def flutterSdk = properties.getProperty("flutter.sdk")
        assert flutterSdk != null, "flutter.sdk not set in local.properties"
        return flutterSdk
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
    // AGP Version match kitta (8.1.1)
    id "com.android.application" version "8.1.1" apply false
    // Kotlin version match kitta (1.9.0)
    id "org.jetbrains.kotlin.android" version "1.9.0" apply false
}

include ':app'